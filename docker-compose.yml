services:
  cups:
    image: hanxi/cups:latest
    user: root
    environment:
      - CUPSADMIN=${CUPSADMIN}
      - CUPSPASSWORD=${CUPSPASSWORD}
    ports:
      - "631:631"
    # USB 打印机热插拔支持（issue #81）：
    # 不能用 devices:——它是容器启动时的一次性设备绑定，打印机「后开机」时
    # 宿主机 udev 新建的 /dev/bus/usb/<bus>/<dev> 节点不会传播进容器，导致
    # CUPS 枚举不到，必须重启容器。改为 bind-mount 整个 /dev/bus/usb 目录
    # （目录挂载实时反映新建节点），配合 device_cgroup_rules 放开 USB 字符
    # 设备（major 189）的 cgroup 权限，让 CUPS 的 usb backend 在运行时能
    # 枚举到后接入的打印机。/run/udev 只读挂载让 libusb 读到设备属性，
    # 改善识别（宿主机无 /run/udev 时该挂载可删除）。
    volumes:
      - ./.etc:/etc/cups
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
    device_cgroup_rules:
      - 'c 189:* rmw'
    restart: unless-stopped

  web:
    image: hanxi/cups-web:master
    user: root
    environment:
      - CUPS_HOST=cups:631
    volumes:
      - ./.data:/data
      - ./.uploads:/uploads
    ports:
      - "1180:8080"
    depends_on:
      - cups
    restart: unless-stopped
